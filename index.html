<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Recargas Games - Oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%); 
            color: #fff; 
            padding: 20px; 
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 30px; padding: 20px; }
        .header h1 { 
            font-size: 2.2rem; 
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            font-weight: 800;
        }
        
        .game-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .menu-item { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 10px 22px; 
            border-radius: 40px; 
            font-weight: bold; 
            color: #94a3b8; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .menu-item.active { background: #4ecdc4; color: #0f172a; border-color: #4ecdc4; }
        
        .game-section { display: none; padding: 10px 0; }
        .game-section.active-section { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .game-title { 
            font-size: 1.5rem; 
            margin: 20px 0; 
            border-left: 5px solid #4ecdc4; 
            padding-left: 15px; 
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }

        .product-card { 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 24px; 
            padding: 25px 15px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }
        .product-card:hover { 
            background: rgba(78, 205, 196, 0.05); 
            border-color: #4ecdc4;
            transform: translateY(-5px);
        }

        .product-name { font-size: 1.3rem; font-weight: 800; margin-bottom: 5px; }
        .product-price-bs { color: #fbbf24; font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        .product-price-usd { color: #64748b; font-size: 0.85rem; margin-bottom: 15px; }
        
        .choose-btn { 
            background: transparent; 
            border: 1.5px solid #4ecdc4; 
            color: #4ecdc4; 
            padding: 10px 25px; 
            border-radius: 30px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 90%;
            transition: 0.3s;
        }

        .payment-card { 
            background: rgba(15, 23, 42, 0.9); 
            border-radius: 20px; 
            padding: 25px; 
            max-width: 400px; 
            margin: 40px auto; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .detail-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .detail-label { color: #718096; font-size: 0.9rem; }
        .detail-value { color: #fff; font-weight: bold; font-size: 1.1rem; }
        #dynamicAmount { color: #4ecdc4; }
        
        .copy-all-btn { 
            background: transparent; 
            border: 2px solid #ed8936; 
            color: #ed8936; 
            width: 100%; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px;
        }

        .client-form { 
            background: rgba(15, 23, 42, 0.9); 
            padding: 25px; 
            border-radius: 20px; 
            max-width: 450px; 
            margin: 20px auto; 
            display: none; 
            border: 1px solid #4ecdc4;
        }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px;
            border-radius: 10px; 
            border: 1px solid #334155; 
            background: #0a0f1e; 
            color: white; 
        }
        .send-order-btn { 
            background: #4ecdc4; 
            border: none; 
            color: #0f172a; 
            padding: 15px; 
            border-radius: 12px; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🎮 RECARGAS GAMES</h1><p>OPERADORES EN LÍNEA</p></div>

        <div class="game-menu">
            <div class="menu-item active" data-section="freefire">FREE FIRE</div>
            <div class="menu-item" data-section="blockstrike">BLOCK STRIKE</div>
            <div class="menu-item" data-section="netflix">NETFLIX</div>
            <div class="menu-item" data-section="roblox">ROBLOX</div>
        </div>

        <div id="freefire" class="game-section active-section">
            <div class="game-title">🔥 DIAMANTES Y PASES FF</div>
            <div class="products-grid" id="freefire-products"></div>
        </div>

        <div id="blockstrike" class="game-section">
            <div class="game-title">🔫 BLOCK STRIKE</div>
            <div class="products-grid" id="blockstrike-products"></div>
        </div>

        <div id="netflix" class="game-section">
            <div class="game-title">🎬 NETFLIX</div>
            <div class="products-grid" id="netflix-products"></div>
        </div>

        <div id="roblox" class="game-section">
            <div class="game-title">🧸 ROBLOX</div>
            <div class="products-grid" id="roblox-products"></div>
        </div>

        <div class="payment-card" id="pagoModulo">
            <div class="detail-row"><div><span class="detail-label">Banco</span><div class="detail-value">Venezuela (0102)</div></div></div>
            <div class="detail-row"><div><span class="detail-label">Teléfono</span><div class="detail-value">04228242411</div></div></div>
            <div class="detail-row"><div><span class="detail-label">Cédula</span><div class="detail-value">32824869</div></div></div>
            <div class="detail-row"><div><span class="detail-label">Monto</span><div class="detail-value" id="dynamicAmount">[Selecciona]</div></div></div>
            <button class="copy-all-btn" id="btnCopiarTodo">📋 Copiar todos los datos</button>
        </div>

        <div class="client-form" id="clientForm">
            <h3 style="text-align: center;">📝 DATOS DEL PEDIDO</h3>
            <div id="dynamicFields"></div>
            <button class="send-order-btn" id="btnEnviar">ENVIAR A WHATSAPP</button>
        </div>
    </div>

    <script>
        const tasa = 650;
        const productos = {
            freefire: [
                { name: "110💎", usd: 0.97 }, { name: "220💎", usd: 1.96 },
                { name: "341💎", usd: 3.20 }, { name: "572💎", usd: 4.89 },
                { name: "1166💎", usd: 9.00 }, { name: "2398💎", usd: 19.00 },
                { name: "6160💎", usd: 48.00 },
                { name: "T. Semanal básica", usd: 0.73 }, { name: "T. Semanal", usd: 2.50 },
                { name: "T. Mensual", usd: 11.00 }, { name: "Pase Booyah", usd: 3.50 },
                { name: "Pase de Nivel", usd: 4.00 }
            ],
            blockstrike: [
                { name: "51🪙", usd: 0.52 }, { name: "105🪙", usd: 1.00 },
                { name: "320🪙", usd: 2.95 }, { name: "540🪙", usd: 4.90 },
                { name: "1100🪙", usd: 10.00 }, { name: "2260🪙", usd: 20.00 },
                { name: "5800🪙", usd: 48.00 },
                { name: "Pase elite", usd: 4.15 }, { name: "Pase elite plus", usd: 10.00 },
                { name: "Pase de mejora", usd: 2.10 }
            ],
            netflix: [{ name: "Pantalla Netflix", usd: 4.00 }],
            roblox: [{ name: "400 ROBUX", usd: 5.00 }, { name: "800 ROBUX", usd: 10.00 }]
        };

        let prodSel = null;
        let nickFF = "";

        Object.keys(productos).forEach(id => {
            const grid = document.getElementById(`${id}-products`);
            productos[id].forEach(p => {
                const bs = Math.ceil(p.usd * tasa);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => seleccionar(p, id, bs);
                card.innerHTML = `<div class="product-name">${p.name}</div><div class="product-price-bs">${bs} Bs</div><div class="product-price-usd">$${p.usd} USD</div><button class="choose-btn">ELEGIR</button>`;
                grid.appendChild(card);
            });
        });

        document.querySelectorAll('.menu-item').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active-section'));
                document.getElementById(btn.dataset.section).classList.add('active-section');
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                btn.classList.add('active');
            };
        });

        function seleccionar(p, game, bs) {
            prodSel = { ...p, game, bs };
            document.getElementById('dynamicAmount').innerText = bs + ' Bs';
            document.getElementById('clientForm').style.display = 'block';
            nickFF = "";
            let html = '';
            
            if (game === 'freefire') {
                html = `<div class="form-group"><label>ID DE JUGADOR</label><input type="text" id="uId" placeholder="Pega el ID"><div id="vSt"></div></div>`;
            } else if (game === 'netflix') {
                html = `<div class="form-group"><label>NÚMERO DE TELÉFONO</label><input type="text" id="uId" placeholder="Tu número"></div>`;
            } else if (game === 'roblox') {
                html = `<div class="form-group"><label>CORREO ELECTRÓNICO</label><input type="email" id="uId" placeholder="Tu correo de Roblox"></div>`;
            } else if (game === 'blockstrike') {
                html = `<div class="form-group"><label>ID DE JUGADOR</label><input type="text" id="uId" placeholder="Tu ID de Block Strike"></div>`;
            }
            
            html += `<div class="form-group"><label>REFERENCIA DE PAGO</label><input type="text" id="refP" placeholder="Nro de confirmación"></div>`;
            document.getElementById('dynamicFields').innerHTML = html;

            if (game === 'freefire') {
                document.getElementById('uId').onblur = async function() {
                    if (!this.value) return;
                    document.getElementById('vSt').innerText = "Buscando...";
                    try {
                        const r = await fetch(`https://wlx-demon-info.vercel.app/profile_info?uid=${this.value}&region=id&key=FFwlx`);
                        const d = await r.json();
                        if (d.success) { nickFF = d.AccountInfo.AccountName; document.getElementById('vSt').innerHTML = `<span style="color:#4ecdc4">✅ ${nickFF}</span>`; }
                        else { document.getElementById('vSt').innerHTML = `<span style="color:#ff6b6b">❌ No encontrado</span>`; }
                    } catch (e) { document.getElementById('vSt').innerText = ""; }
                };
            }
            document.getElementById('pagoModulo').scrollIntoView({ behavior: 'smooth' });
        }

        document.getElementById('btnCopiarTodo').onclick = function() {
            const m = document.getElementById('dynamicAmount').innerText;
            if (m.includes('[')) return alert("Selecciona producto");
            navigator.clipboard.writeText(`Banco: Venezuela (0102)\nTeléfono: 04228242411\nCédula: 32824869\nMonto: ${m}`);
            this.innerText = "✅ COPIADO";
            setTimeout(() => this.innerText = "📋 Copiar todos los datos", 2000);
        };

        document.getElementById('btnEnviar').onclick = function() {
            const val = document.getElementById('uId').value;
            const ref = document.getElementById('refP').value;
            if (!val || !ref) return alert("Completa los datos");
            let tD = prodSel.game === 'netflix' ? "Teléfono" : prodSel.game === 'roblox' ? "Correo" : "ID";
            const msg = `🛒 *NUEVO PEDIDO*%0A%0A🎮 *Juego:* ${prodSel.game.toUpperCase()}%0A📦 *Producto:* ${prodSel.name}%0A💰 *Monto:* ${prodSel.bs} Bs%0A🆔 *${tD}:* ${val} ${nickFF ? '('+nickFF+')' : ''}%0A🏦 *Ref:* ${ref}`;
            window.open(`https://wa.me/584264696162?text=${msg}`, '_blank');
        };
    </script>
</body>
</html>
